apiVersion: apps/v1
kind: Deployment
metadata:
  name: engie-mca-event-handler
  labels:
    app: engie-mca-event-handler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engie-mca-event-handler
  template:
    metadata:
      labels:
        app: engie-mca-event-handler
    spec:
      containers:
      - name: app
        image: image-registry.openshift-image-registry.svc:5000/loek-engie/engie-mca-event-handler:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "10m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - configMapRef:
            name: engie-mca-config
        env:
        - name: REDIS_URL
          value: "engie-mca-redis:6379"
        readinessProbe:
          httpGet:
            path: /api/event/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/event/health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: engie-mca-event-handler
spec:
  selector:
    app: engie-mca-event-handler
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: engie-mca-event-handler
spec:
  to:
    kind: Service
    name: engie-mca-event-handler
  port:
    targetPort: http
---
