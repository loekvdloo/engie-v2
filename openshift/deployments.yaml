apiVersion: apps/v1
kind: Deployment
metadata:
  name: engie-mca-redis
  labels:
    app: engie-mca-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: engie-mca-redis
  template:
    metadata:
      labels:
        app: engie-mca-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: "10m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: engie-mca-redis
spec:
  selector:
    app: engie-mca-redis
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
