---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: engie-mca-event-handler
spec:
  source:
    type: Git
    git:
      uri: REPLACE_WITH_YOUR_GIT_URL
      ref: main
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile.service
      buildArgs:
      - name: SERVICE_PATH
        value: Engie.Mca.EventHandler
      - name: PROJECT_FILE
        value: Engie.Mca.EventHandler.csproj
      - name: APP_DLL
        value: Engie.Mca.EventHandler.dll
  output:
    to:
      kind: ImageStreamTag
      name: engie-mca-event-handler:latest
---
