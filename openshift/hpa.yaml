apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: engie-mca-event-handler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: engie-mca-event-handler
  minReplicas: 1
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
---
