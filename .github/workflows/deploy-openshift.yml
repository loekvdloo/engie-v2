name: Deploy OpenShift

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Git ref to deploy (branch/tag/SHA)
        required: false
        default: main
  push:
    branches:
    - main

env:
  OPENSHIFT_SERVER: ${{ secrets.OPENSHIFT_SERVER }}
  OPENSHIFT_NAMESPACE: ${{ secrets.OPENSHIFT_NAMESPACE }}
  OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
  DEPLOY_REF: ${{ github.event.inputs.deploy_ref || github.ref_name }}
  REPOSITORY_URL: https://github.com/${{ github.repository }}.git

jobs:
  ci-gate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.deploy_ref || github.ref_name }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore and run all tests
      run: |
        mkdir -p test-results
        for csproj in tests/*/*.csproj; do
          dotnet restore "$csproj"
          name=$(basename "$csproj" .csproj)
          dotnet test "$csproj" --configuration Release --no-restore --collect:"XPlat Code Coverage" --logger "trx;LogFileName=${name}.trx" --results-directory test-results
        done

    - name: Upload gate test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: deploy-gate-test-results
        path: |
          test-results/**/*.trx
          test-results/**/coverage.cobertura.xml

  deploy:
    needs: ci-gate
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ env.DEPLOY_REF }}

    - name: Install oc CLI
      uses: redhat-actions/openshift-tools-installer@v1
      with:
        oc: latest

    - name: Validate required OpenShift secrets
      run: |
        missing=0
        if [ -z "${OPENSHIFT_SERVER}" ]; then
          echo "OPENSHIFT_SERVER is empty"
          missing=1
        fi
        if [ -z "${OPENSHIFT_TOKEN}" ]; then
          echo "OPENSHIFT_TOKEN is empty"
          missing=1
        fi
        if [ -z "${OPENSHIFT_NAMESPACE}" ]; then
          echo "OPENSHIFT_NAMESPACE is empty"
          missing=1
        fi
        [ "$missing" -eq 0 ]

    - name: Login to OpenShift
      run: |
        echo "Testing API reachability for ${OPENSHIFT_SERVER}"
        code=$(curl -ksS -o /tmp/oc-whoami.json -w "%{http_code}" \
          -H "Authorization: Bearer ${OPENSHIFT_TOKEN}" \
          "${OPENSHIFT_SERVER}/apis/user.openshift.io/v1/users/~")
        echo "OpenShift user API HTTP status: ${code}"
        if [ "${code}" != "200" ]; then
          echo "Token check failed before oc login"
          cat /tmp/oc-whoami.json || true
          exit 1
        fi

        oc login --token="${OPENSHIFT_TOKEN}" --server="${OPENSHIFT_SERVER}" --insecure-skip-tls-verify=true

    - name: Verify OpenShift context
      run: |
        test -n "${OPENSHIFT_NAMESPACE}"
        oc whoami
        oc project "${OPENSHIFT_NAMESPACE}"
        oc status

    - name: Prepare namespace-aware manifests
      run: |
        cp openshift/buildconfigs.yaml /tmp/buildconfigs.yaml
        cp openshift/deployments.yaml /tmp/deployments.yaml
        cp openshift/autoscaler-70-40.yaml /tmp/autoscaler-70-40.yaml

        sed -i "s|REPLACE_WITH_YOUR_GIT_URL|${REPOSITORY_URL}|g" /tmp/buildconfigs.yaml
        sed -i "s|ref: main|ref: ${DEPLOY_REF}|g" /tmp/buildconfigs.yaml
        sed -i "s|image-registry.openshift-image-registry.svc:5000/loek-engie/|image-registry.openshift-image-registry.svc:5000/${OPENSHIFT_NAMESPACE}/|g" /tmp/deployments.yaml
        sed -i "s|NAMESPACE=\"\${NAMESPACE:-loek-engie}\"|NAMESPACE=\"\${NAMESPACE:-${OPENSHIFT_NAMESPACE}}\"|g" /tmp/autoscaler-70-40.yaml

    - name: Apply build and runtime manifests
      run: |
        oc apply -f /tmp/buildconfigs.yaml
        oc apply -f openshift/configmap.yaml
        oc apply -f /tmp/deployments.yaml
        oc apply -f /tmp/autoscaler-70-40.yaml

    - name: Disable old HPA (use 70/40 autoscaler)
      run: |
        oc delete hpa engie-mca-event-handler engie-mca-message-processor engie-mca-message-validator engie-mca-nack-handler engie-mca-output-handler --ignore-not-found=true

    - name: Trigger OpenShift image builds
      run: |
        oc start-build engie-mca-event-handler --follow
        oc start-build engie-mca-message-processor --follow
        oc start-build engie-mca-message-validator --follow
        oc start-build engie-mca-nack-handler --follow
        oc start-build engie-mca-output-handler --follow

    - name: Restart deployments to latest images
      run: |
        oc rollout restart deployment/engie-mca-event-handler
        oc rollout restart deployment/engie-mca-message-processor
        oc rollout restart deployment/engie-mca-message-validator
        oc rollout restart deployment/engie-mca-nack-handler
        oc rollout restart deployment/engie-mca-output-handler

    - name: Wait for rollout
      run: |
        oc rollout status deployment/engie-mca-event-handler --timeout=300s
        oc rollout status deployment/engie-mca-message-processor --timeout=300s
        oc rollout status deployment/engie-mca-message-validator --timeout=300s
        oc rollout status deployment/engie-mca-nack-handler --timeout=300s
        oc rollout status deployment/engie-mca-output-handler --timeout=300s

    - name: Smoke test EventHandler route
      run: |
        HOST=$(oc get route engie-mca-event-handler -o jsonpath='{.spec.host}')
        curl -fsS "http://${HOST}/api/event/health"

    - name: Dump deploy diagnostics on failure
      if: failure()
      run: |
        oc whoami || true
        oc project || true
        oc get builds,pods,deployment,route -o wide || true
        for build in $(oc get builds --sort-by=.metadata.creationTimestamp -o name | tail -n 5); do
          echo "=== ${build} ==="
          oc logs "${build}" --tail=100 || true
        done
