name: Continuous Test Data

on:
  workflow_dispatch:
    inputs:
      api_base:
        description: Public EventHandler base URL (zonder /api)
        required: true
        default: http://engie-mca-event-handler-loek-engie.apps.experience.ilionx-ocp.com
      min_per_minute:
        description: Min aantal berichten per minuut
        required: true
        default: "180"
      max_per_minute:
        description: Max aantal berichten per minuut
        required: true
        default: "320"
      duplicate_rate_percent:
        description: Percentage duplicate messageId's (0-100)
        required: true
        default: "18"
      duration_minutes:
        description: Hoe lang laten draaien (cancel run om eerder te stoppen)
        required: true
        default: "25"
      include_full_fault_catalog:
        description: Draai ook volledige faultcode script per loop
        type: boolean
        required: true
        default: false

jobs:
  stream-testdata:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Run continuous standard test data
      shell: pwsh
      run: |
        $params = @{
          ApiBase              = "${{ github.event.inputs.api_base }}"
          MinPerMinute         = [int]"${{ github.event.inputs.min_per_minute }}"
          MaxPerMinute         = [int]"${{ github.event.inputs.max_per_minute }}"
          DuplicateRatePercent = [int]"${{ github.event.inputs.duplicate_rate_percent }}"
          DurationMinutes      = [int]"${{ github.event.inputs.duration_minutes }}"
        }

        if ('${{ github.event.inputs.include_full_fault_catalog }}' -eq 'true') {
          $params.IncludeFullFaultCatalog = $true
        }

        ./scripts/stream-standard-testdata.ps1 @params
