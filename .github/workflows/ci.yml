name: CI

on:
  push:
    branches:
    - '**'
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore source projects
      run: |
        for csproj in src/*/*.csproj; do
          dotnet restore "$csproj"
        done

    - name: Build source projects
      run: |
        for csproj in src/*/*.csproj; do
          dotnet build "$csproj" --configuration Release --no-restore
        done

    - name: Restore test projects
      run: |
        for csproj in tests/*/*.csproj; do
          dotnet restore "$csproj"
        done

    - name: Run tests
      run: |
        mkdir -p test-results
        for csproj in tests/*/*.csproj; do
          name=$(basename "$csproj" .csproj)
          dotnet test "$csproj" --configuration Release --no-restore --collect:"XPlat Code Coverage" --logger "trx;LogFileName=${name}.trx" --results-directory test-results
        done

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          test-results/**/*.trx
          test-results/**/coverage.cobertura.xml
